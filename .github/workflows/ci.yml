name: CI Pipeline

on:
  pull_request:
    branches:
      - master
      - main
    
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Build Docker Image
        run: |
          docker build -t vigneshawss/app-page:${{ github.sha }} .
          docker tag vigneshawss/app-page:${{ github.sha }} vigneshawss/app-page:v1

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: vigneshawss/app-page:${{ github.sha }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            vigneshawss/app-page:v1
            vigneshawss/app-page:${{ github.sha }}
